name: "Setup"
description: "Install Nix tools and project dependencies"

runs:
  using: "composite"
  steps:
    - uses: DeterminateSystems/nix-installer-action@v16

    - name: Install nix packages
      shell: bash
      run: |
        nix profile install --inputs-from . nixpkgs#nodejs_24
        nix profile install --inputs-from . nixpkgs#pnpm
        nix profile install --inputs-from . nixpkgs#typescript-go
        nix profile install --inputs-from . nixpkgs#oxfmt
        nix profile install --inputs-from . nixpkgs#oxlint

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

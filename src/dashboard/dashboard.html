<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>つかいわけ口座ダッシュボード</title>
    <style>
      :root {
        color-scheme: light dark;
        --border: light-dark(#d5dbe1, #3a4149);
        --muted: light-dark(#5b6670, #9aa5ae);
        --accent: light-dark(#0a6cb3, #5db3e8);
        --card-bg: light-dark(#f4f7f9, #23282e);
      }
      body {
        font-family: system-ui, sans-serif;
        margin: 0 auto;
        max-width: 960px;
        padding: 1.5rem;
        line-height: 1.6;
        position: relative;
      }
      .settings-button {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.1rem;
        height: 2.4rem;
        line-height: 1;
        position: absolute;
        right: 1.5rem;
        top: 1.6rem;
        width: 2.4rem;
      }
      .back-button {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font: inherit;
        padding: 0;
        text-decoration: underline;
      }
      h1 {
        font-size: 1.4rem;
        border-bottom: 2px solid var(--accent);
        padding-bottom: 0.4rem;
      }
      h2 {
        font-size: 1.1rem;
        margin-top: 2rem;
      }
      .balance-cards {
        display: flex;
        flex-wrap: wrap;
        gap: 0.8rem;
      }
      .balance-card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.8rem 1.2rem;
        min-width: 10rem;
      }
      .balance-card.total {
        border-color: var(--accent);
      }
      .account-name {
        color: var(--muted);
        font-size: 0.85rem;
      }
      .account-balance {
        font-size: 1.3rem;
        font-variant-numeric: tabular-nums;
      }
      .updated-at {
        color: var(--muted);
        font-size: 0.85rem;
      }
      .table-scroll {
        overflow-x: auto;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border: 1px solid var(--border);
        padding: 0.4rem 0.8rem;
        text-align: left;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }
      th {
        background: var(--card-bg);
      }
      td:has(input.comment) {
        min-width: 10rem;
      }
      .empty {
        color: var(--muted);
      }
      .period {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem 1.5rem;
        margin-top: 1.5rem;
      }
      .month-nav {
        align-items: center;
        display: inline-flex;
        gap: 0.3rem;
      }
      .month-nav button {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: inherit;
        cursor: pointer;
        font: inherit;
        padding: 0.2rem 0.6rem;
      }
      .month-nav input[type="month"] {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: inherit;
        font: inherit;
        font-size: 1rem;
        padding: 0.2rem 0.5rem;
      }
      .period-detail {
        align-items: center;
        display: inline-flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .period-detail .period-label {
        font-size: 0.8rem;
      }
      .period-label {
        color: var(--muted);
        font-size: 0.9rem;
      }
      .period input[type="date"] {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: inherit;
        font: inherit;
        font-size: 0.9rem;
        padding: 0.2rem 0.5rem;
      }
      .period-clear {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font: inherit;
        font-size: 0.9rem;
        text-decoration: underline;
      }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 0.8rem;
      }
      .tab {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 999px;
        color: inherit;
        cursor: pointer;
        font: inherit;
        font-size: 0.9rem;
        padding: 0.25rem 0.9rem;
      }
      .tab.active {
        background: var(--accent);
        border-color: var(--accent);
        color: light-dark(#fff, #16191d);
      }
      .destination-summary {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 0.6rem;
      }
      .summary-item {
        display: inline-block;
        margin-left: 0.8rem;
        font-variant-numeric: tabular-nums;
      }
      input.comment {
        background: transparent;
        border: 1px solid transparent;
        border-radius: 4px;
        color: inherit;
        font: inherit;
        font-size: 0.9rem;
        padding: 0.15rem 0.4rem;
        width: 100%;
        box-sizing: border-box;
      }
      input.comment:hover {
        border-color: var(--border);
      }
      input.comment:focus {
        border-color: var(--accent);
        outline: none;
        background: var(--card-bg);
      }
      .sync-form {
        display: grid;
        gap: 0.5rem;
        grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr));
        margin-bottom: 0.8rem;
      }
      .sync-field {
        display: flex;
        flex-direction: column;
        font-size: 0.85rem;
        color: var(--muted);
        gap: 0.2rem;
      }
      .sync-field input {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: light-dark(#1c2126, #e8eaed);
        font: inherit;
        padding: 0.35rem 0.6rem;
      }
      .sync-buttons {
        display: flex;
        gap: 0.6rem;
      }
      .sync-buttons button {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: inherit;
        cursor: pointer;
        font: inherit;
        padding: 0.35rem 1rem;
      }
      .sync-buttons button.sync-now {
        background: var(--accent);
        border-color: var(--accent);
        color: light-dark(#fff, #16191d);
      }
      .sync-status,
      .import-status {
        color: var(--muted);
        font-size: 0.9rem;
        min-height: 1.2em;
      }
      a.export {
        color: var(--accent);
        display: inline-block;
        margin-bottom: 0.8rem;
      }
      .import-row {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        font-size: 0.9rem;
        gap: 0.6rem;
      }
      .note {
        color: var(--muted);
        font-size: 0.85rem;
      }
      /* モバイル: 余白を詰め、歯車ボタンと見出しの重なりを避ける */
      @media (max-width: 640px) {
        body {
          padding: 1rem 0.75rem;
        }
        h1 {
          font-size: 1.15rem;
          margin-top: 0.4rem;
          padding-right: 3rem;
        }
        .settings-button {
          right: 0.75rem;
          top: 0.9rem;
        }
        h2 {
          margin-top: 1.4rem;
        }
        .balance-cards {
          gap: 0.5rem;
        }
        .balance-card {
          flex: 1 1 calc(50% - 0.5rem);
          min-width: 0;
          padding: 0.6rem 0.8rem;
          box-sizing: border-box;
        }
        .account-balance {
          font-size: 1.1rem;
        }
        th,
        td {
          font-size: 0.9rem;
          padding: 0.3rem 0.5rem;
        }
      }
    </style>
  </head>
  <body>
    <h1>つかいわけ口座ダッシュボード</h1>
    <div id="app"><p class="empty">読み込み中…</p></div>
    <script src="dashboard.js"></script>
  </body>
</html>
